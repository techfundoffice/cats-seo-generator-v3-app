name: Deploy SEO Generator V3

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/seo-generator-v3:latest
            ghcr.io/${{ github.repository }}/seo-generator-v3:${{ github.sha }}
          build-args: |
            APP_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        if: ${{ vars.DEPLOY_HOST != '' }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/seo-generator-v3:latest
            # Stop PM2 process if running (transitioning to Docker)
            su -c 'pm2 stop seo-generator-v3 2>/dev/null || true' claudeuser
            docker stop seo-generator-v3 || true
            docker rm seo-generator-v3 || true
            docker run -d \
              --name seo-generator-v3 \
              --restart unless-stopped \
              -p 3000:3000 \
              --add-host=host.docker.internal:host-gateway \
              --env-file /opt/seo-generator-v3/.env \
              ghcr.io/${{ github.repository }}/seo-generator-v3:latest